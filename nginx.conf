worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    keepalive_requests 10000;
    reset_timedout_connection on;
    
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 15s;
    
    server_tokens off;
    server_name_in_redirect off;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    
    resolver 8.8.8.8 1.1.1.1 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    proxy_connect_timeout 15s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;
    
    map $http_connection $connection_upgrade {
        default upgrade;
        '' close;
    }
    
    upstream xray_trojan_ws {
        server 127.0.0.1:10000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_trojan_hu {
        server 127.0.0.1:10001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_trojan_xh {
        server 127.0.0.1:10002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vmess_ws {
        server 127.0.0.1:10003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vmess_hu {
        server 127.0.0.1:10004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vmess_xh {
        server 127.0.0.1:10005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vless_ws {
        server 127.0.0.1:10006 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vless_hu {
        server 127.0.0.1:10007 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_vless_xh {
        server 127.0.0.1:10008 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_ss_ws {
        server 127.0.0.1:10009 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_ss_hu {
        server 127.0.0.1:10010 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream xray_ss_xh {
        server 127.0.0.1:10011 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    server {
        listen 8080 default_server backlog=4096;
        server_name _;
        
        error_page 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/local/openresty/nginx/html;
            internal;
        }
        
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
            access_log off;
        }
        
        location = / {
            root /usr/local/openresty/nginx/html;
            index index.html;
        }
        
        # Trojan - WebSocket
        location /saeka-tojirp {
            proxy_pass http://xray_trojan_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_socket_keepalive on;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;
        }
        
        # Trojan - HTTP Upgrade
        location /saeka-tojirp-hu {
            proxy_pass http://xray_trojan_hu;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_socket_keepalive on;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
        
        # Trojan - XHTTP
        location /saeka-tojirp-xh {
            proxy_pass http://xray_trojan_xh;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_socket_keepalive on;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
        
        # VMess - WebSocket
        location /vmess-saeka {
            proxy_pass http://xray_vmess_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
