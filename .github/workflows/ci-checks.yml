name: 🔍 Virtual Pre-Deployment Checker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  virtual-deployment-check:
    name: 🧪 Virtual Cloud Shell Deployment Test
    runs-on: ubuntu-latest
    
    outputs:
      overall_status: ${{ steps.final-status.outputs.status }}
      error_count: ${{ steps.error-counter.outputs.count }}
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔧 Setup Testing Environment
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🔍 VIRTUAL PRE-DEPLOYMENT CHECKER v1.0"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "📁 Repository: ${{ github.repository }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🕐 Time: $(date)"
          echo ""
          
          # Create virtual Cloud Shell environment
          mkdir -p /tmp/cloudshell-sim
          mkdir -p /tmp/cloudshell-sim/nginx
          mkdir -p /tmp/cloudshell-sim/xray
          mkdir -p /tmp/cloudshell-sim/www
          
          # Copy all files to simulation
          cp -r ./* /tmp/cloudshell-sim/ 2>/dev/null || true
          
          # Install testing tools
          sudo apt-get update -qq
          sudo apt-get install -y -qq nginx html-tidy jq shellcheck docker.io curl wget 2>/dev/null || true
          
      - name: 📊 File Change Detection
        id: file-changes
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     📊 FILE CHANGE DETECTION"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          # Get changed files
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            ADDED_FILES=$(git diff --diff-filter=A --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            REMOVED_FILES=$(git diff --diff-filter=D --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            MODIFIED_FILES=$(git diff --diff-filter=M --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
            ADDED_FILES=$(git diff --diff-filter=A --name-only origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
            REMOVED_FILES=$(git diff --diff-filter=D --name-only origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
            MODIFIED_FILES=$(git diff --diff-filter=M --name-only origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
          fi
          
          echo "📝 CHANGES DETECTED:"
          echo "   ➕ Added files: $(echo "$ADDED_FILES" | wc -l)"
          echo "   ➖ Removed files: $(echo "$REMOVED_FILES" | wc -l)"
          echo "   📝 Modified files: $(echo "$MODIFIED_FILES" | wc -l)"
          echo ""
          
          if [ -n "$ADDED_FILES" ]; then
            echo "➕ ADDED FILES:"
            echo "$ADDED_FILES" | sed 's/^/     /'
            echo ""
          fi
          
          if [ -n "$REMOVED_FILES" ]; then
            echo "⚠️ REMOVED FILES (may affect deployment):"
            echo "$REMOVED_FILES" | sed 's/^/     /'
            echo ""
          fi
          
          if [ -n "$MODIFIED_FILES" ]; then
            echo "📝 MODIFIED FILES:"
            echo "$MODIFIED_FILES" | sed 's/^/     /'
            echo ""
          fi
          
          # Save to output
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: 🔍 HTML File Validation
        id: html-validation
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🔍 HTML FILE VALIDATION"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          ERROR_COUNT=0
          WARNING_COUNT=0
          ERROR_LOG=""
          
          # Find all HTML files
          for file in $(find . -name "*.html" -type f 2>/dev/null); do
            echo "📄 Checking: $file"
            
            # Check file exists and not empty
            if [ ! -s "$file" ]; then
              echo "   ❌ ERROR: File is empty"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[EMPTY] $file - File is empty\n"
              continue
            fi
            
            # Check for basic HTML structure
            if ! grep -q "<!DOCTYPE html" "$file" && ! grep -q "<html" "$file"; then
              echo "   ⚠️ WARNING: Missing DOCTYPE or html tag"
              WARNING_COUNT=$((WARNING_COUNT+1))
            fi
            
            # Check for unclosed tags (basic)
            OPEN_DIV=$(grep -o "<div[^>]*>" "$file" | wc -l)
            CLOSE_DIV=$(grep -o "</div>" "$file" | wc -l)
            if [ "$OPEN_DIV" -ne "$CLOSE_DIV" ]; then
              echo "   ❌ ERROR: Unclosed div tags (open: $OPEN_DIV, close: $CLOSE_DIV)"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[UNCLOSED_DIV] $file - Open: $OPEN_DIV, Close: $CLOSE_DIV\n"
            fi
            
            # Check for script syntax errors using node
            if command -v node &> /dev/null; then
              # Extract JavaScript from script tags
              grep -oP '(?<=<script>).*?(?=</script>)' "$file" > /tmp/js_check.js 2>/dev/null || true
              if [ -s /tmp/js_check.js ]; then
                if ! node -c /tmp/js_check.js 2>/dev/null; then
                  echo "   ❌ ERROR: JavaScript syntax error in inline script"
                  ERROR_COUNT=$((ERROR_COUNT+1))
                  ERROR_LOG="${ERROR_LOG}[JS_ERROR] $file - Inline script syntax error\n"
                fi
              fi
            fi
            
            # Check for missing closing body/html
            if ! grep -q "</body>" "$file"; then
              echo "   ⚠️ WARNING: Missing </body> tag"
              WARNING_COUNT=$((WARNING_COUNT+1))
            fi
            if ! grep -q "</html>" "$file"; then
              echo "   ⚠️ WARNING: Missing </html> tag"
              WARNING_COUNT=$((WARNING_COUNT+1))
            fi
            
            # Check for broken external links (basic pattern)
            grep -oP '(?<=href=")[^"]+' "$file" | grep -v "^#" | grep -v "^javascript:" | while read link; do
              if [[ "$link" == http* ]] && [[ "$link" != *"${{ github.repository }}"* ]]; then
                echo "   ℹ️ INFO: External link: $link"
              fi
            done
            
            echo "   ✅ Basic HTML check passed"
            echo ""
          done
          
          echo "═══════════════════════════════════════════════════════════"
          echo "📊 HTML Validation Results:"
          echo "   ❌ Errors: $ERROR_COUNT"
          echo "   ⚠️ Warnings: $WARNING_COUNT"
          echo "═══════════════════════════════════════════════════════════"
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "ERRORS FOUND:"
            echo -e "$ERROR_LOG"
          fi
          
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warning_count=$WARNING_COUNT" >> $GITHUB_OUTPUT
          
      - name: 🔧 JSON Configuration Validation
        id: json-validation
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🔧 JSON CONFIGURATION VALIDATION"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          ERROR_COUNT=0
          WARNING_COUNT=0
          ERROR_LOG=""
          
          for file in $(find . -name "*.json" -type f 2>/dev/null); do
            echo "📄 Checking: $file"
            
            if [ ! -s "$file" ]; then
              echo "   ❌ ERROR: File is empty"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[EMPTY] $file - JSON file is empty\n"
              continue
            fi
            
            # Validate JSON syntax
            if command -v jq &> /dev/null; then
              if ! jq empty "$file" 2>/tmp/json_error.txt; then
                echo "   ❌ ERROR: Invalid JSON syntax"
                cat /tmp/json_error.txt | sed 's/^/        /'
                ERROR_COUNT=$((ERROR_COUNT+1))
                ERROR_LINE=$(jq -r 'input_line_number' /tmp/json_error.txt 2>/dev/null || echo "unknown")
                ERROR_LOG="${ERROR_LOG}[JSON_SYNTAX] $file - Line $ERROR_LINE: $(cat /tmp/json_error.txt | head -1)\n"
                continue
              fi
              echo "   ✅ JSON syntax valid"
            else
              echo "   ⚠️ jq not available, skipping deep validation"
            fi
            
            # Check specific structure for config.json
            if [[ "$file" == *"config.json"* ]]; then
              echo "   🔍 Checking Xray config structure..."
              
              # Check for required top-level fields
              for field in "inbounds" "outbounds" "routing"; do
                if ! jq -e ".$field" "$file" > /dev/null 2>&1; then
                  echo "   ❌ ERROR: Missing required field '$field'"
                  ERROR_COUNT=$((ERROR_COUNT+1))
                  ERROR_LOG="${ERROR_LOG}[MISSING_FIELD] $file - Missing '$field'\n"
                fi
              done
              
              # Check inbound ports
              if jq -e '.inbounds' "$file" > /dev/null 2>&1; then
                PORT_COUNT=$(jq '.inbounds | length' "$file")
                echo "   📊 Found $PORT_COUNT inbound configurations"
                
                # Check for duplicate ports
                jq '.inbounds[].port' "$file" | sort | uniq -d | while read dup; do
                  echo "   ❌ ERROR: Duplicate port $dup found"
                  ERROR_COUNT=$((ERROR_COUNT+1))
                  ERROR_LOG="${ERROR_LOG}[DUPLICATE_PORT] $file - Port $dup appears multiple times\n"
                done
              fi
            fi
            
            echo ""
          done
          
          echo "═══════════════════════════════════════════════════════════"
          echo "📊 JSON Validation Results:"
          echo "   ❌ Errors: $ERROR_COUNT"
          echo "   ⚠️ Warnings: $WARNING_COUNT"
          echo "═══════════════════════════════════════════════════════════"
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "ERRORS FOUND:"
            echo -e "$ERROR_LOG"
          fi
          
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          
      - name: 🐳 Dockerfile Validation
        id: docker-validation
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🐳 DOCKERFILE VALIDATION"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          ERROR_COUNT=0
          WARNING_COUNT=0
          ERROR_LOG=""
          
          for file in $(find . -name "Dockerfile*" -type f 2>/dev/null); do
            echo "📄 Checking: $file"
            
            if [ ! -s "$file" ]; then
              echo "   ❌ ERROR: Dockerfile is empty"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[EMPTY] $file - Dockerfile is empty\n"
              continue
            fi
            
            # Check for FROM instruction
            if ! grep -q "^FROM" "$file"; then
              echo "   ❌ ERROR: No FROM instruction found"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[NO_FROM] $file - Missing FROM instruction\n"
            else
              FROM_IMAGE=$(grep "^FROM" "$file" | head -1 | awk '{print $2}')
              echo "   ✅ Base image: $FROM_IMAGE"
            fi
            
            # Check for EXPOSE instruction
            if ! grep -q "^EXPOSE" "$file"; then
              echo "   ⚠️ WARNING: No EXPOSE instruction (Cloud Run requires port 8080)"
              WARNING_COUNT=$((WARNING_COUNT+1))
            fi
            
            # Check for CMD or ENTRYPOINT
            if ! grep -q "^CMD" "$file" && ! grep -q "^ENTRYPOINT" "$file"; then
              echo "   ❌ ERROR: No CMD or ENTRYPOINT instruction"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[NO_CMD] $file - Missing CMD or ENTRYPOINT\n"
            fi
            
            # Check for COPY with missing source files
            grep "^COPY" "$file" | while read copy_line; do
              SOURCE=$(echo "$copy_line" | awk '{print $2}')
              if [ -n "$SOURCE" ] && [ ! -f "$SOURCE" ] && [ ! -d "$SOURCE" ]; then
                echo "   ⚠️ WARNING: COPY source '$SOURCE' may not exist"
                WARNING_COUNT=$((WARNING_COUNT+1))
              fi
            done
            
            # Simulate docker build dry-run
            if command -v docker &> /dev/null; then
              echo "   🔍 Running docker build dry-run..."
              if ! docker build -f "$file" --dry-run . > /dev/null 2>&1; then
                echo "   ⚠️ WARNING: Docker build dry-run may have issues"
              else
                echo "   ✅ Docker build dry-run passed"
              fi
            fi
            
            echo ""
          done
          
          echo "═══════════════════════════════════════════════════════════"
          echo "📊 Dockerfile Validation Results:"
          echo "   ❌ Errors: $ERROR_COUNT"
          echo "   ⚠️ Warnings: $WARNING_COUNT"
          echo "═══════════════════════════════════════════════════════════"
          
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          
      - name: 🌐 Nginx Configuration Validation
        id: nginx-validation
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "     🌐 NGINX CONFIGURATION VALIDATION"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          ERROR_COUNT=0
          WARNING_COUNT=0
          ERROR_LOG=""
          
          for file in $(find . -name "nginx.conf" -type f 2>/dev/null); do
            echo "📄 Checking: $file"
            
            if [ ! -s "$file" ]; then
              echo "   ❌ ERROR: nginx.conf is empty"
              ERROR_COUNT=$((ERROR_COUNT+1))
              ERROR_LOG="${ERROR_LOG}[EMPTY] $file - nginx.conf is empty\n"
              continue
            fi
          
