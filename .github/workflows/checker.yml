name: Pre-Deployment Checker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nginx jq
      
      - name: Create validator script
        run: |
          cat > /tmp/validator.py << 'PYTHON_SCRIPT'
          import os
          import re
          import json
          import subprocess
          from pathlib import Path
          
          errors = 0
          warnings = 0
          
          G = '\033[92m'
          R = '\033[91m'
          Y = '\033[93m'
          C = '\033[96m'
          B = '\033[1m'
          E = '\033[0m'
          
          def ok(msg): print(f"{G}OK: {msg}{E}")
          def err(msg): global errors; errors += 1; print(f"{R}ERROR: {msg}{E}")
          def warn(msg): global warnings; warnings += 1; print(f"{Y}WARN: {msg}{E}")
          def info(msg): print(f"{C}INFO: {msg}{E}")
          
          print("=" * 70)
          print("404-DEPLOYER VALIDATION TOOL".center(70))
          print("=" * 70)
          
          # Phase 1: File manifest
          print("\n--- PHASE 1: FILE MANIFEST ---")
          required = ["index.html", "config.json", "nginx.conf", "Dockerfile", "deploy.sh"]
          for f in required:
              if Path(f).exists():
                  ok(f"{f} found")
              else:
                  err(f"{f} MISSING")
          
          if errors > 0:
              exit(1)
          
          # Phase 2: index.html
          print("\n--- PHASE 2: index.html ---")
          with open("index.html") as f:
              html = f.read()
          
          if "<!DOCTYPE html" in html:
              ok("DOCTYPE present")
          else:
              err("DOCTYPE missing")
          
          open_div = html.count("<div")
          close_div = html.count("</div>")
          if open_div == close_div:
              ok(f"Div tags balanced ({open_div}/{close_div})")
          else:
              err(f"Div mismatch: open={open_div}, close={close_div}")
          
          # Phase 3: config.json
          print("\n--- PHASE 3: config.json ---")
          try:
              with open("config.json") as f:
                  config = json.load(f)
              ok("JSON syntax valid")
              
              inbounds = config.get("inbounds", [])
              info(f"Total inbounds: {len(inbounds)}")
              
              ports = [i["port"] for i in inbounds]
              if len(set(ports)) != len(ports):
                  err("Duplicate ports found")
              else:
                  ok("No duplicate ports")
          except json.JSONDecodeError as e:
              err(f"JSON error at line {e.lineno}: {e.msg}")
              errors += 1
          
          # Phase 4: nginx.conf
          print("\n--- PHASE 4: nginx.conf ---")
          result = subprocess.run(["nginx", "-t", "-c", os.getcwd() + "/nginx.conf"], capture_output=True, text=True)
          if result.returncode == 0:
              ok("nginx.conf syntax valid")
          else:
              err("nginx.conf syntax invalid")
              errors += 1
          
          # Phase 5: Dockerfile
          print("\n--- PHASE 5: Dockerfile ---")
          with open("Dockerfile") as f:
              docker = f.read()
          
          if re.search(r"^FROM", docker, re.M):
              ok("FROM instruction present")
          else:
              err("FROM missing")
          
          if re.search(r"^EXPOSE", docker, re.M):
              ok("EXPOSE present")
          else:
              warn("No EXPOSE instruction")
          
          if re.search(r"^CMD|^ENTRYPOINT", docker, re.M):
              ok("CMD/ENTRYPOINT present")
          else:
              err("CMD or ENTRYPOINT missing")
          
          # Phase 6: deploy.sh
          print("\n--- PHASE 6: deploy.sh ---")
          result = subprocess.run(["bash", "-n", "deploy.sh"], capture_output=True, text=True)
          if result.returncode == 0:
              ok("deploy.sh syntax valid")
          else:
              err("deploy.sh syntax invalid")
              errors += 1
          
          # Final summary
          print("\n" + "=" * 70)
          print("SUMMARY")
          print("=" * 70)
          print(f"Errors: {errors}")
          print(f"Warnings: {warnings}")
          
          if errors > 0:
              print("\nDEPLOYMENT BLOCKED - Fix errors above")
              exit(1)
          else:
              print("\nALL CHECKS PASSED - Ready for deployment")
              exit(0)
          PYTHON_SCRIPT
      
      - name: Run validator
        run: python3 /tmp/validator.py
